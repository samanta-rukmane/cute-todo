<!DOCTYPE html>
<html lang="en">    <!-- Root element, language = English -->

<head>
    <meta charset="UTF-8">    <!-- Charset to support emojis and all characters -->
    <title> My Cute Todos </title>    <!-- Page title shown on browser tab -->
    <link rel="stylesheet" href="style.css">    <!-- Link to CSS file -->
</head>

<body>
    <div class="container">    <!-- Main container for styling and centering -->
        <h1> My Cute Todos </h1>    <!-- Main page headding -->

        <div class="todo-input">    <!-- Input block for new tasks -->
            <input type="text" id="taskInput" placeholder="Write down the task...">    <!-- Text input -->
            <button id="addBtn"> Add </button>    <!-- Button to add task -->
        </div>

        <ul id="taskList"></ul>    <!-- Unordered list for tasks -->
    </div>

    <script src="script.js"></script>    <!-- Link to JavaScript -->
</body>
</html>
